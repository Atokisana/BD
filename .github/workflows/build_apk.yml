name: Build CENAD APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Enable i386 and install deps
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y build-essential git zip unzip libssl-dev libffi-dev python3-dev openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev cmake libc6:i386 libstdc++6:i386 lib32z1
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33
      - name: Build APK
        run: buildozer android debug 2>&1 | tee build.log
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cenad-debug-apk
          path: bin/*.apk
          retention-days: 30
      - name: Upload log si echec
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
