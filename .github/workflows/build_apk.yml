name: Build APK (Kivy/Buildozer)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK Android
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Java 17
        uses: actions/setup-java@v4.7.1
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Python 3.10
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            git zip unzip \
            python3-pip \
            autoconf libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev libncursesw5-dev \
            cmake \
            libffi-dev libssl-dev \
            build-essential \
            ccache \
            libltdl-dev \
            libgstreamer1.0-dev \
            gstreamer1.0-plugins-base \
            libgstreamer-plugins-base1.0-dev \
            libgl1-mesa-dev \
            libgles2-mesa-dev \
            lld

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer==1.5.0
          pip install cython==0.29.33

      - name: Cache Buildozer
        uses: actions/cache@v4.2.3
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}-v2
          restore-keys: |
            buildozer-

      - name: Build APK
        env:
          ANDROIDSDK: ${{ github.workspace }}/.buildozer/android/platform/android-sdk
          ANDROIDNDK: ${{ github.workspace }}/.buildozer/android/platform/android-ndk-r25b
        run: |
          buildozer -v android debug 2>&1 | tee build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4.6.2
        with:
          name: cenad-app-debug
          path: bin/*.apk
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: build-log
          path: build.log
